<section class="card">
  <h3>Transactions</h3>
  <table>
    <thead><tr><th>Date</th><th>From</th><th>To</th><th>Status</th><th>Amount</th><th>Fees</th></tr></thead>
    <tbody>
      @for (item of transactions; track item.id) {
        <tr>
          <td>{{ item.transactionDate }}</td>
          <td>{{ item.sourceWallet }}</td>
          <td>{{ item.destination }}</td>
          <td>{{ item.status }}</td>
          <td [class.negative]="item.amount < 0">{{ item.amount | number:'1.2-2' }}</td>
          <td>{{ item.fees | number:'1.2-2' }}</td>
        </tr>
      }
    </tbody>
  </table>
</section>
